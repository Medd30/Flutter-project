<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section})}">

<section>

    <h2>User Management</h2>

    <table border="1" width="100%">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.status}"></td>
            <td>
                <form th:action="@{|/admin/users/${u.id}/approve|}" method="post">
                    <button type="submit">Approve</button>
                </form>

                <form th:action="@{|/admin/users/${u.id}/delete|}" method="post">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>

    </table>

</section>

</html>
