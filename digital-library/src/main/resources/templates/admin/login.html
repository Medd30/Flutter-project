<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <style>
        body{font-family:system-ui;background:#0b1220;color:#fff;display:grid;place-items:center;height:100vh;margin:0}
        .card{width:360px;background:#121a2b;border-radius:16px;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
        h1{font-size:18px;margin:0 0 14px}
        input{width:100%;padding:12px;border-radius:12px;border:1px solid #28324a;background:#0f1626;color:#fff}
        .row{margin:10px 0}
        button{width:100%;padding:12px;border-radius:12px;border:0;background:#6d28d9;color:#fff;font-weight:700;cursor:pointer}
        .msg{font-size:13px;color:#ffb4b4;margin-top:10px}
    </style>
</head>
<body>
<div class="card">
    <h1>Admin Dashboard</h1>

    <form th:action="@{/admin/login}" method="post">
        <div class="row">
            <input name="username" placeholder="Email or phone" autocomplete="username" required />
        </div>
        <div class="row">
            <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
        </div>
        <button type="submit">Login</button>
    </form>

    <div class="msg" th:if="${param.error}">Invalid credentials.</div>
    <div class="msg" style="color:#b7ffd1" th:if="${param.logout}">Logged out.</div>
</div>
</body>
</html>
