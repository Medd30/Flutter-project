<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Dashboard</title>

    <style>
        body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#0b1220; color:#e5e7eb; }
        .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid rgba(255,255,255,.08); background: rgba(15,23,42,.85); position:sticky; top:0; backdrop-filter: blur(10px); }
        .brand { font-weight:800; letter-spacing:.3px; }
        .nav a { color:#cbd5e1; text-decoration:none; margin-left:14px; padding:8px 10px; border-radius:10px; }
        .nav a:hover { background: rgba(148,163,184,.12); color:#fff; }
        .container { max-width:1100px; margin:0 auto; padding:22px; }
        .card { background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:16px; padding:16px; }
        .grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap:14px; }
        .tile { display:block; padding:18px; border-radius:16px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.06); text-decoration:none; color:#e5e7eb; }
        .tile:hover { background: rgba(255,255,255,.09); }
        .tile h3 { margin:0 0 6px; font-size:16px; }
        .tile p { margin:0; color:#cbd5e1; font-size:13px; line-height:1.35; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand">Digital Library — Admin</div>
    <div class="nav">
        <a href="/admin">Home</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/books">Books</a>
<!--        <a href="/admin/reviews">Reviews</a>-->
    </div>
</div>

<div class="container">
    <section th:replace="${content}"></section>
</div>
</body>
</html>
